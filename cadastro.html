<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Criar conta — Meu Estoque e Vendas</title>
<meta name="description" content="Crie sua conta grátis no MEV e comece a controlar o estoque e as vendas da sua loja em minutos.">
<meta name="theme-color" content="#12281F">

<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css" data-clarity-unmask="true">

<script type="text/javascript">
(function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "xhal4lh08w");
</script>
</head>
<body class="auth-page">

<div class="auth-card">
  <button type="button" class="auth-voltar" onclick="voltar()" aria-label="Voltar">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Voltar
  </button>

  <img class="auth-logo" src="icons/icon-192.png" alt="MEV">

  <div class="auth-head">
    <p class="eyebrow">MEV · Meu Estoque e Vendas</p>
    <h1>Criar conta</h1>
    <p class="sub">Grátis, sem cartão. Sua loja fica pronta na hora.</p>
  </div>

  <form class="auth-form" onsubmit="event.preventDefault(); cadastro();">
    <div class="field">
      <label for="nome">Seu nome</label>
      <input id="nome" type="text" placeholder="Como podemos te chamar" autocomplete="name" required>
    </div>
    <div class="field">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="voce@exemplo.com" autocomplete="email" inputmode="email" required>
    </div>
    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
    </div>

    <p id="erro" class="auth-erro"></p>

    <button id="btnCriar" class="btn primary" type="submit">Criar conta grátis</button>
  </form>

  <div class="auth-divider"><span>ou</span></div>

  <a class="btn google" href="/api/auth/google">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/>
      <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
    </svg>
    Cadastrar com Google
  </a>

  <p class="auth-footer">Já tem conta? <a href="/login.html">Entrar</a></p>
</div>

<script>
function voltar() {
  if (document.referrer && document.referrer.indexOf(location.origin) === 0 && history.length > 1) {
    history.back();
  } else {
    window.location.href = "/planos.html";
  }
}

async function cadastro() {
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const erroEl = document.getElementById("erro");
  const botao = document.getElementById("btnCriar");
  erroEl.textContent = "";

  if (!nome || !email || !senha) {
    erroEl.textContent = "Preencha nome, e-mail e senha.";
    return;
  }
  if (senha.length < 6) {
    erroEl.textContent = "A senha precisa ter pelo menos 6 caracteres.";
    return;
  }

  botao.disabled = true;
  botao.textContent = "Criando conta...";

  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, email, senha })
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = "/index.html";
      return;
    }
    erroEl.textContent = data.error || "Erro ao criar conta.";
  } catch (e) {
    erroEl.textContent = "Não foi possível conectar ao servidor.";
  }

  botao.disabled = false;
  botao.textContent = "Criar conta grátis";
}
</script>

</body>
</html>
