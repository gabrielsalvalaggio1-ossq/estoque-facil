<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu Estoque</title>

<meta name="description" content="Controle de estoque e vendas simples para pequenos comerciantes.">
<meta name="theme-color" content="#1B3A2F">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>


<!-- 📦 APP -->
<div id="shell" style="display:none;">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">

    <div class="brand">
      <span class="brand-mark">E</span>
      <span class="brand-name">Estoque Fácil</span>
    </div>

    <button type="button" class="side-item tabs active" data-tab="estoque">
      📦 Estoque
    </button>

    <button type="button" class="side-item tabs" data-tab="vendas">
      🛒 Vendas
    </button>

    <button type="button" class="side-item tabs" data-tab="conta">
      👤 Conta
    </button>

    <button type="button" class="side-item tabs" data-tab="contato">
      📞 Contato
    </button>

    <button type="button" class="side-item" id="btnExportarSidebar">
      ⬇ Exportar
    </button>

  </nav>

  <!-- APP -->
  <div id="app">

    <header class="top">
      <p class="eyebrow" id="dateLabel">—</p>
      <h1>Meu estoque</h1>
      <p class="sub">Controle o que você tem e cobre em segundos.</p>

      <div class="stats">
        <div class="stat">
          <div class="lbl">Vendido hoje</div>
          <div class="val" id="statHoje">R$ 0</div>
        </div>

        <div class="stat">
          <div class="lbl">Vendido no mês</div>
          <div class="val" id="statMes">R$ 0</div>
        </div>

        <div class="stat warn" id="statLowWrap" onclick="irParaEstoqueBaixo()">
          <div class="lbl">Estoque baixo</div>
          <div class="val" id="statLow">0</div>
        </div>
      </div>

      <p class="topsellers" id="topSellers" style="display:none;"></p>
    </header>

    <!-- TABS SUPERIOR -->
    <nav class="tabs">

      <button type="button" class="active" data-tab="estoque">
        Estoque
      </button>

      <button type="button" data-tab="vendas">
        Vendas
      </button>

      <button type="button" id="btnExportar">
        Exportar
      </button>

    </nav>

    <!-- TOOLBAR -->
    <div class="toolbar" id="toolbarEstoque">

      <button type="button" class="btn-destaque" id="btnAddProduct">
        Adicionar produto
      </button>

      <button type="button" class="btn-scan-toolbar" id="btnEscanearVender">
        📷
      </button>

    </div>

    <main id="main"></main>

    <!-- CARRINHO -->
    <div class="cartbar" id="cartbar">
      <div>
        <div class="left" id="cartCount">0 itens no carrinho</div>
        <div class="total" id="cartTotal">R$ 0,00</div>
      </div>

      <button type="button" id="btnCobrar">Cobrar</button>
    </div>

  </div>
</div>

<!-- SCRIPTS -->
<script src="js/db.js"></script>
<script src="js/produtos.js"></script>
<script src="js/vendas.js"></script>
<script src="js/app.js"></script>

<!-- LOGIN SCRIPT -->
<script>
const USERS = [{ user: "admin", pass: "1234" }];

function login() {
  const user = document.getElementById("login-user").value;
  const pass = document.getElementById("login-pass").value;

  const found = USERS.find(u => u.user === user && u.pass === pass);

  if (found) {
    localStorage.setItem("logged", "true");

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("shell").style.display = "flex";
  } else {
    document.getElementById("login-error").innerText =
      "Usuário ou senha inválidos";
  }
}

window.onload = function () {
  const logged = localStorage.getItem("logged");

  if (logged === "true") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("shell").style.display = "flex";
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("shell").style.display = "none";
  }
};
</script>

</body>
</html>
