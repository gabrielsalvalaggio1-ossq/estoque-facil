<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu Estoque</title>
<meta name="description" content="Controle de estoque e vendas simples para pequenos comerciantes.">
<meta name="theme-color" content="#1B3A2F">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="shell">
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-mark">E</span>
      <span class="brand-name">Estoque Fácil</span>
    </div>
    <button class="side-item tabs active" data-tab="estoque">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>
      Estoque
    </button>
    <button class="side-item tabs" data-tab="vendas">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      Vendas
    </button>
    <button class="side-item" id="btnExportarSidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar
    </button>
  </nav>

  <div id="app">
    <header class="top">
      <p class="eyebrow" id="dateLabel">—</p>
      <h1>Meu estoque</h1>
      <p class="sub">Controle o que você tem e cobre em segundos.</p>
      <div class="stats">
        <div class="stat">
          <div class="lbl">Vendido hoje</div>
          <div class="val" id="statHoje">R$ 0</div>
        </div>
        <div class="stat">
          <div class="lbl">Vendido no mês</div>
          <div class="val" id="statMes">R$ 0</div>
        </div>
        <div class="stat warn" id="statLowWrap" onclick="irParaEstoqueBaixo()">
          <div class="lbl">Estoque baixo</div>
          <div class="val" id="statLow">0</div>
        </div>
      </div>
      <p class="topsellers" id="topSellers" style="display:none;"></p>
    </header>

    <nav class="tabs">
      <button class="active" data-tab="estoque">Estoque</button>
      <button data-tab="vendas">Vendas</button>
      <button class="export-link" id="btnExportar" aria-label="Exportar estoque">Exportar</button>
    </nav>

    <div class="toolbar" id="toolbarEstoque">
      <button class="btn-destaque" id="btnAddProduct">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar produto
      </button>
      <button class="btn-scan-toolbar" id="btnEscanearVender" title="Escanear e vender" aria-label="Escanear código de barras para vender">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      </button>
    </div>

    <main id="main"></main>

    <div class="cartbar" id="cartbar">
      <div>
        <div class="left" id="cartCount">0 itens no carrinho</div>
        <div class="total" id="cartTotal">R$ 0,00</div>
      </div>
      <button id="btnCobrar">Cobrar</button>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/produtos.js"></script>
<script src="js/vendas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
