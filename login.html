<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Estoque e Vendas — Login</title>
  <style>
    body { font-family: Arial; padding: 30px; max-width: 320px; }
    input { display: block; margin: 10px 0; padding: 10px; width: 250px; }
    button, a.google {
      display: inline-block; margin-top: 10px; padding: 10px 14px;
      cursor: pointer; text-decoration: none; border-radius: 6px; font-weight: 600;
    }
    button { background: #1b3a2f; color: white; border: none; width: 100%; }
    a.google { background: white; border: 1px solid #ccc; color: #333; display: block; text-align: center; }
    #erro { color: #b33; font-size: 13px; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>

<h2>Entrar</h2>

<input id="email" placeholder="E-mail" type="email">
<input id="senha" type="password" placeholder="Senha">
<p id="erro"></p>

<button onclick="login()">Entrar</button>

<br>

<a class="google" href="/api/auth/google">Entrar com Google</a>

<p style="margin-top:20px; font-size:13px;">
  Não tem conta? <a href="/cadastro.html">Criar conta</a>
</p>

<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const erroEl = document.getElementById("erro");
  erroEl.textContent = "";

  if (!email || !senha) {
    erroEl.textContent = "Preencha e-mail e senha.";
    return;
  }

  try {
    // Caminho relativo (mesmo domínio) — é o que faz o cookie de sessão
    // funcionar. Chamar um domínio diferente (ex: workers.dev) nunca
    // funcionaria aqui, porque o cookie não atravessa domínios diferentes.
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = "/index.html";
    } else {
      erroEl.textContent = data.error || "Erro no login.";
    }
  } catch (e) {
    erroEl.textContent = "Não foi possível conectar ao servidor.";
  }
}
</script>

</body>
</html>
