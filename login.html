<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MEV - Login</title>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 250px;
    }

    button, a.google {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
    }

    button {
      background: #1b3a2f;
      color: white;
      border: none;
    }

    a.google {
      background: white;
      border: 1px solid #ccc;
      color: #333;
    }
  </style>
</head>

<body>

<h2>Login MEV</h2>

<!-- LOGIN TRADICIONAL -->
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<!-- GOOGLE LOGIN -->
<br><br>

<a class="google"
   href="https://accounts.google.com/o/oauth2/v2/auth?
client_id=294475962988-mvcrimimmonbl82p2ak5fc1oufdkeqgr.apps.googleusercontent.com&
redirect_uri=https://mev-api.gabrielsalvalaggio1.workers.dev/api/auth/google/callback&
response_type=code&
scope=email profile">
  Entrar com Google
</a>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch("https://mev-api.gabrielsalvalaggio1.workers.dev/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (data.ok) {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "/index.html";
  } else {
    alert("Erro no login");
  }
}
</script>

</body>
</html>
